<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Anna Černá</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #cceeff, #99ddff);
            margin: 0;
            overflow: hidden;
            color: #03396c;
        }

        h1, p {
            text-align: center;
            position: relative;
            z-index: 2;
        }

        h1 {
            margin-top: 40px;
            font-size: 48px;
        }

        p {
            font-size: 22px;
        }

        .cat {
            position: absolute;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .cat:hover {
            transform: scale(1.1);
        }
    </style>
</head>
<body>

    <h1>Anna Černá</h1>
    <p>Klikni na kočku 🐱</p>

    <script>
        const catImages = [
            "https://cdn.pixabay.com/photo/2016/02/10/16/37/cat-1192026_1280.jpg",
            "https://cdn.pixabay.com/photo/2017/02/20/18/03/cat-2083492_1280.jpg",
            "https://cdn.pixabay.com/photo/2015/11/16/22/14/cat-1046544_1280.jpg",
            "https://cdn.pixabay.com/photo/2017/11/09/21/41/cat-2934720_1280.jpg"
        ];

        function createCat() {
            const cat = document.createElement("img");
            cat.src = catImages[Math.floor(Math.random() * catImages.length)];
            cat.classList.add("cat");

            const size = 100 + Math.random() * 120;
            cat.style.width = size + "px";

            cat.style.left = Math.random() * (window.innerWidth - size) + "px";
            cat.style.top = Math.random() * (window.innerHeight - size) + "px";

            // kliknutí = přechod na hru
            cat.addEventListener("click", () => {
                window.location.href = "hra.html";
            });

            document.body.appendChild(cat);
        }

        // vytvoří kočky
        for (let i = 0; i < 12; i++) {
            createCat();
        }
    </script>

</body>
</html>
